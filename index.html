<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>📱 TikTok No Logo ➔ Telegram Bot</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b0b14 0%, #141a2a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      max-width: 620px;
      width: 100%;
      background: rgba(18, 22, 35, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 40px;
      padding: 28px 22px 32px;
      box-shadow: 0 30px 50px -10px #00000080, 0 0 0 1px #2a3a60 inset;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .logo-icon {
      background: linear-gradient(145deg, #ff0050, #00f2ea);
      width: 56px;
      height: 56px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px #ff005040;
    }

    .logo-icon i {
      font-size: 34px;
      color: white;
      filter: drop-shadow(0 2px 4px black);
    }

    .title h1 {
      color: #fff;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
    }

    .title span {
      font-size: 0.9rem;
      color: #a6b0d0;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .section {
      margin-bottom: 24px;
    }

    .label {
      color: #cbd5ff;
      font-weight: 500;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-group {
      display: flex;
      align-items: center;
      background: #1a1e30;
      border-radius: 60px;
      padding: 4px 4px 4px 18px;
      border: 1.5px solid #2f3a5a;
      transition: 0.2s;
    }

    .input-group:focus-within {
      border-color: #ff3b5c;
      box-shadow: 0 0 0 3px #ff3b5c30;
    }

    .input-group i {
      color: #8f9fc0;
      font-size: 1.2rem;
    }

    .input-group input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 15px 10px;
      color: #f0f4ff;
      font-size: 1rem;
      outline: none;
    }

    .input-group input::placeholder {
      color: #6a7695;
    }

    .paste-btn {
      background: #2d3855;
      border: none;
      color: #ddd;
      padding: 10px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #4e5f88;
      transition: 0.15s;
    }

    .paste-btn:hover {
      background: #3f4b72;
      color: white;
    }

    .fetch-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(145deg, #ff0050, #c70042);
      border: none;
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 10px 20px #ff005060;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      border: 1px solid #ff6080;
    }

    .fetch-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .telegram-config {
      background: #0e1322;
      border-radius: 28px;
      padding: 20px 18px;
      margin: 20px 0 18px;
      border: 1px dashed #3e5270;
    }

    .config-title {
      color: #9bb9ff;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .save-config-btn {
      background: #1e3a5f;
      border: none;
      color: white;
      padding: 12px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      width: 100%;
      border: 1px solid #3a6a9f;
    }

    .preview-area {
      margin-top: 20px;
      border-radius: 28px;
      overflow: hidden;
      background: #0b0f1a;
      border: 1px solid #2e3f60;
    }

    video {
      width: 100%;
      display: block;
      max-height: 320px;
      background: #000;
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background: #121a2a;
      gap: 14px;
    }

    .btn-download, .btn-telegram {
      padding: 12px 22px;
      border-radius: 50px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid;
      cursor: pointer;
      transition: 0.15s;
      font-size: 1rem;
    }

    .btn-download {
      background: #2c3a60;
      border-color: #5f7ab0;
      color: white;
    }

    .btn-telegram {
      background: #1c92d2;
      border-color: #8fd3fe;
      color: white;
      box-shadow: 0 4px 10px #1c92d250;
    }

    .btn-telegram:hover {
      background: #26a0e0;
    }

    .status-box {
      min-height: 44px;
      padding: 12px 16px;
      border-radius: 30px;
      background: #131b2a;
      color: #b8c7ff;
      margin: 16px 0 8px;
      border-left: 5px solid #ff3b5c;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hidden {
      display: none !important;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #ffffff30;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      margin-top: 22px;
      color: #7f8db0;
      font-size: 0.8rem;
      text-align: center;
    }

    i {
      margin-right: 4px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo-icon">
      <i class="fab fa-tiktok"></i>
    </div>
    <div class="title">
      <h1>TikNoLogo ➔ TG</h1>
      <span><i class="fas fa-robot"></i> Gửi video thẳng vào Telegram Bot</span>
    </div>
  </div>

  <!-- Nhập link TikTok -->
  <div class="section">
    <div class="label"><i class="fas fa-link"></i> Link video TikTok</div>
    <div class="input-group">
      <i class="fas fa-video"></i>
      <input type="text" id="tiktokUrl" placeholder="Dán link video TikTok..." autocomplete="off">
      <button class="paste-btn" id="pasteBtn"><i class="far fa-clipboard"></i> Dán</button>
    </div>
  </div>

  <button class="fetch-btn" id="fetchBtn">
    <i class="fas fa-cloud-download-alt"></i> Lấy video không logo
  </button>

  <!-- Cấu hình Telegram Bot -->
  <div class="telegram-config">
    <div class="config-title">
      <i class="fab fa-telegram-plane"></i> Kết nối Telegram Bot của bạn
    </div>
    <div class="input-group" style="margin-bottom: 12px;">
      <i class="fas fa-key"></i>
      <input type="password" id="botToken" placeholder="Bot Token (từ @BotFather)" autocomplete="off">
    </div>
    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" id="chatId" placeholder="Chat ID của bạn" autocomplete="off">
    </div>
    <button class="save-config-btn" id="saveConfigBtn">
      <i class="fas fa-save"></i> Lưu cấu hình & kiểm tra
    </button>
    <div style="font-size: 0.8rem; color: #9aabcf; margin-top: 12px;">
      <i class="fas fa-info-circle"></i> Lấy Chat ID: gửi /start cho <a href="https://t.me/userinfobot" target="_blank" style="color:#aad0ff;">@userinfobot</a>
    </div>
  </div>

  <!-- Trạng thái -->
  <div id="statusBox" class="status-box">
    <i class="fas fa-info-circle"></i> <span id="statusText">Sẵn sàng. Nhập link và cấu hình Bot.</span>
  </div>

  <!-- Khu vực xem trước & hành động -->
  <div id="previewPanel" class="preview-area hidden">
    <video id="videoPlayer" controls controlsList="nodownload"></video>
    <div class="action-bar">
      <span style="color:#bdc7ff;"><i class="fas fa-music"></i> <span id="musicTitle">--</span></span>
      <div style="display: flex; gap: 10px;">
        <a href="#" id="downloadBtn" class="btn-download" target="_blank">
          <i class="fas fa-download"></i> Tải về
        </a>
        <button id="sendTelegramBtn" class="btn-telegram">
          <i class="fab fa-telegram-plane"></i> Gửi tới Bot
        </button>
      </div>
    </div>
  </div>

  <div class="footer-note">
    ⚡ API không logo · Gửi video qua Telegram Bot (của bạn)
  </div>
</div>

<script>
  (function(){
    "use strict";

    // DOM
    const urlInput = document.getElementById('tiktokUrl');
    const pasteBtn = document.getElementById('pasteBtn');
    const fetchBtn = document.getElementById('fetchBtn');
    const statusSpan = document.getElementById('statusText');
    const previewPanel = document.getElementById('previewPanel');
    const videoPlayer = document.getElementById('videoPlayer');
    const musicSpan = document.getElementById('musicTitle');
    const downloadBtn = document.getElementById('downloadBtn');
    const sendTelegramBtn = document.getElementById('sendTelegramBtn');
    const botTokenInput = document.getElementById('botToken');
    const chatIdInput = document.getElementById('chatId');
    const saveConfigBtn = document.getElementById('saveConfigBtn');

    let currentVideoUrl = '';
    let currentVideoData = null;
    let isLoading = false;

    // Lưu config vào localStorage
    function loadConfig() {
      const token = localStorage.getItem('tg_bot_token');
      const chatId = localStorage.getItem('tg_chat_id');
      if (token) botTokenInput.value = token;
      if (chatId) chatIdInput.value = chatId;
    }
    loadConfig();

    saveConfigBtn.addEventListener('click', async () => {
      const token = botTokenInput.value.trim();
      const chatId = chatIdInput.value.trim();
      if (!token || !chatId) {
        setStatus('❌ Cần nhập đủ Token và Chat ID', true);
        return;
      }
      localStorage.setItem('tg_bot_token', token);
      localStorage.setItem('tg_chat_id', chatId);
      // Kiểm tra kết nối bot
      setStatus('⏳ Đang kiểm tra kết nối bot...');
      try {
        const res = await fetch(`https://api.telegram.org/bot${token}/getMe`);
        const data = await res.json();
        if (data.ok) {
          setStatus(`✅ Bot @${data.result.username} đã sẵn sàng. Chat ID đã lưu.`);
        } else {
          setStatus('❌ Token không hợp lệ.', true);
        }
      } catch (e) {
        setStatus('❌ Không thể kết nối Telegram (kiểm tra mạng)', true);
      }
    });

    function setStatus(msg, isError = false) {
      statusSpan.innerHTML = msg;
      const box = document.getElementById('statusBox');
      box.style.borderLeftColor = isError ? '#ff6666' : '#ff3b5c';
    }

    function resetPreview() {
      previewPanel.classList.add('hidden');
      videoPlayer.src = '';
      musicSpan.textContent = '--';
      downloadBtn.href = '#';
      currentVideoUrl = '';
    }

    function isValidTikTokUrl(url) {
      return /(tiktok\.com\/@[\w.-]+\/video\/\d+|vm\.tiktok\.com|vt\.tiktok\.com)/i.test(url);
    }

    // Gọi API tikwm.com lấy link không logo
    async function fetchNoWatermark(url) {
      const api = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}&hd=1`;
      const res = await fetch(api);
      if (!res.ok) throw new Error('Lỗi kết nối API');
      const data = await res.json();
      if (data.code !== 0) throw new Error(data.msg || 'Link không hợp lệ / video riêng tư');
      if (!data.data || !data.data.play) throw new Error('Không có link không watermark');
      return data.data;
    }

    // Tải video về máy (blob)
    async function downloadVideo(url, filename) {
      const blob = await fetch(url).then(r => r.blob());
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);
    }

    // Gửi video đến Telegram Bot
    async function sendToTelegram(videoUrl, caption) {
      const token = localStorage.getItem('tg_bot_token');
      const chatId = localStorage.getItem('tg_chat_id');
      if (!token || !chatId) {
        throw new Error('Chưa cấu hình Bot Token hoặc Chat ID');
      }

      // Telegram API: sendVideo (có thể dùng URL trực tiếp)
      const apiUrl = `https://api.telegram.org/bot${token}/sendVideo`;
      const formData = new FormData();
      formData.append('chat_id', chatId);
      formData.append('video', videoUrl);
      formData.append('caption', caption || '🎬 Video TikTok không logo');
      formData.append('supports_streaming', 'true');

      const res = await fetch(apiUrl, {
        method: 'POST',
        body: formData
      });
      const result = await res.json();
      if (!result.ok) {
        throw new Error(result.description || 'Lỗi gửi video');
      }
      return result;
    }

    // Xử lý khi nhấn Lấy video
    fetchBtn.addEventListener('click', async () => {
      if (isLoading) return;
      const url = urlInput.value.trim();
      if (!url) { setStatus('❌ Vui lòng nhập link TikTok', true); return; }
      if (!isValidTikTokUrl(url)) { setStatus('❌ Link không đúng định dạng', true); return; }

      resetPreview();
      isLoading = true;
      fetchBtn.disabled = true;
      setStatus('🔄 Đang lấy link không logo...');

      try {
        const data = await fetchNoWatermark(url);
        currentVideoData = data;
        currentVideoUrl = data.play;
        
        const music = data.music_info?.title || data.music || 'Âm thanh gốc';
        musicSpan.textContent = music.length > 30 ? music.substring(0,30)+'…' : music;
        videoPlayer.src = currentVideoUrl;
        videoPlayer.load();
        downloadBtn.href = currentVideoUrl;
        downloadBtn.onclick = async (e) => {
          e.preventDefault();
          const filename = (data.title || 'tiktok').replace(/[^\w\s]/gi,'').substring(0,35).trim().replace(/\s+/g,'_') + '.mp4';
          setStatus('⏳ Đang tải video...');
          await downloadVideo(currentVideoUrl, filename);
          setStatus('✅ Đã lưu vào thư mục Download');
        };
        
        previewPanel.classList.remove('hidden');
        setStatus(`✅ Đã sẵn sàng. Nhấn "Gửi tới Bot" để lưu vào Telegram.`);
      } catch (err) {
        resetPreview();
        setStatus('❌ ' + err.message, true);
      } finally {
        isLoading = false;
        fetchBtn.disabled = false;
      }
    });

    // Gửi Telegram
    sendTelegramBtn.addEventListener('click', async () => {
      if (!currentVideoUrl) {
        setStatus('❌ Chưa có video để gửi', true);
        return;
      }
      const token = localStorage.getItem('tg_bot_token');
      const chatId = localStorage.getItem('tg_chat_id');
      if (!token || !chatId) {
        setStatus('❌ Vui lòng cấu hình Bot Token và Chat ID rồi Lưu', true);
        return;
      }

      setStatus('📤 Đang gửi video lên Telegram...');
      sendTelegramBtn.disabled = true;
      try {
        const caption = currentVideoData?.title || 'TikTok không logo';
        await sendToTelegram(currentVideoUrl, `🎬 ${caption}\n👁️ ${currentVideoData?.play_count || '--'} lượt xem`);
        setStatus('✅ Đã gửi video thành công đến Telegram Bot của bạn!');
      } catch (err) {
        setStatus('❌ Gửi thất bại: ' + err.message, true);
      } finally {
        sendTelegramBtn.disabled = false;
      }
    });

    // Dán link
    pasteBtn.addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        urlInput.value = text;
        setStatus('📋 Đã dán link');
      } catch {
        setStatus('⚠️ Không thể dán tự động, dán thủ công', true);
      }
    });

    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') fetchBtn.click();
    });

    // Hướng dẫn nhanh lấy chat id
    setStatus('✨ Nhập link TikTok và cấu hình Bot Telegram bên dưới');
  })();
</script>
</body>
</html>
